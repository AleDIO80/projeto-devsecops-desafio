name: 🔐 Pipeline DevSecOps
on:
  push:
    branches: [ "main" ]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  pipeline:
    name: Build, Segurança e Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # ✅ PASSO 1: Já está pronto — Baixar o código
      - name: 📥 Checkout do Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ✅ PASSO 2: Já está pronto — Build
      - name: ⚙️ Build
        run: |
          echo "Verificando arquivos..."
          ls src/
          echo "Build OK!"

      # ✅ PASSO 3: Secrets Scanning com Gitleaks
      # Varre o código e o histórico de commits em busca
      # de credenciais expostas (API keys, senhas, tokens).
      # Quebra a pipeline se encontrar qualquer segredo.
      - name: 🔑 Secrets Scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ✅ PASSO 4: SAST com Semgrep
      # Analisa o código estaticamente sem executá-lo,
      # buscando padrões inseguros: XSS, eval, injeções, etc.
      # Quebra a pipeline se encontrar vulnerabilidades.
      - name: 🔍 SAST - Semgrep
        run: |
          pip install semgrep --quiet
          semgrep scan --config auto --error src/

      # ✅ PASSO 5: SCA com Grype
      # Verifica as dependências do package.json contra
      # bancos de CVEs conhecidos (NVD, GitHub Advisory).
      # Quebra a pipeline para severity >= medium.
      - name: 📦 SCA - Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype dir:. --fail-on medium

      # ✅ PASSO 6: Deploy (só roda se tudo passar)
      - name: 🌐 Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📤 Upload para Produção
        uses: actions/upload-pages-artifact@v3
        with:
          path: './src'

      - name: 🚀 Deploy em Produção
        id: deployment
        uses: actions/deploy-pages@v4
